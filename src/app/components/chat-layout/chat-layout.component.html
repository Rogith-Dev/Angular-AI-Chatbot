<mat-sidenav-container class="chat-container">
  <mat-sidenav
    class="sidebar-panel"
    [mode]="'over'"
    [opened]="sidenavOpen()"
    (closedStart)="closeSidenav()"
    [fixedInViewport]="true"
    [disableClose]="false"
  >
    <app-sidebar (threadSelected)="onThreadSelected()" />
  </mat-sidenav>

  <mat-sidenav-content class="main-panel">
    <aside class="desktop-sidebar" aria-label="Conversation history">
      <app-sidebar (threadSelected)="onThreadSelected()" />
    </aside>

    <main class="chat-main">
      <button
        mat-icon-button
        class="menu-button"
        type="button"
        aria-label="Open conversation list"
        (click)="toggleSidenav()"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <app-chat-window
        [thread]="currentThread()"
        (hintSelected)="onHintSelected($event)"
      />
      <app-chat-input (send)="onSendMessage($event)" />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
