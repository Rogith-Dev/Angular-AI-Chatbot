<div class="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <mat-icon>auto_awesome</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-name">AI Workspace</span>
        <span class="brand-tag">Gemini</span>
      </div>
    </div>
    <button mat-flat-button color="primary" class="new-chat-btn" (click)="onNewChat()">
      <mat-icon>add</mat-icon>
      New Chat
    </button>
  </div>

  <nav class="thread-list" aria-label="Conversation threads">
    <p class="section-label">Recent</p>

    @if (threads().length === 0) {
      <div class="empty-hint">
        <mat-icon>inbox</mat-icon>
        <p>No conversations yet</p>
        <span>Start a new chat to begin</span>
      </div>
    } @else {
      <mat-nav-list class="thread-nav">
        @for (thread of threads(); track thread.id) {
          <button
            mat-list-item
            type="button"
            class="thread-item"
            [class.thread-item--active]="thread.id === currentThreadId()"
            (click)="onSelectThread(thread.id)"
            [attr.aria-current]="thread.id === currentThreadId() ? 'page' : null"
          >
            <mat-icon matListItemIcon class="thread-icon">chat_bubble_outline</mat-icon>
            <span matListItemTitle class="thread-title">{{ thread.title }}</span>
            <span matListItemLine class="thread-meta">
              {{ thread.updatedAt | date: 'MMM d, h:mm a' }}
            </span>

            <button
              mat-icon-button
              matListItemMeta
              type="button"
              class="delete-btn"
              matTooltip="Delete conversation"
              aria-label="Delete conversation"
              (click)="onDeleteThread($event, thread.id)"
            >
              <mat-icon>delete_outline</mat-icon>
            </button>
          </button>
        }
      </mat-nav-list>
    }
  </nav>

  <footer class="sidebar-footer">
    <button
      mat-icon-button
      type="button"
      class="theme-toggle"
      [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="themeService.toggle()"
    >
      <mat-icon>{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <span class="footer-label">{{ themeService.theme() === 'dark' ? 'Dark' : 'Light' }} mode</span>
  </footer>
</div>
